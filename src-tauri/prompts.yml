    ## PARTIE 2 — JUDILIBRE (8 outils)

    ### 2.1 Taxonomie — valeurs clés

    Toujours vérifier via `judilibre_taxonomie(id=...)` si incertain. Valeurs courantes :

    - **Juridiction** : `cc` (Cour de cassation), `ca` (cour d'appel), `tj` (tribunal judiciaire)
    - **Chambre** : `civ1`, `civ2`, `civ3`, `com`, `soc`, `crim`, `mixte`, `pl` (plénière)
    - **Formation** : `fs` (section), `fp` (plénière), `fplr` (plénière référée)
    - **Solution** : `cassation`, `rejet`, `annulation`, `avis`, `irrecevabilite`, `non-lieu`
    - **Publication** : `b` (Bulletin), `r` (Rapport annuel), `l` (ECLI), `c` (Communiqué)

    ### 2.2 Champs de recherche JUDILIBRE

    - `sommaire` — résumé officiel (le plus fiable pour la qualification juridique)
    - `motivations` — raisonnement de la juridiction
    - `dispositif` — partie décisoire
    - `expose` — exposé des faits
    - `moyens` — moyens des parties
    - `titrage` — plan de classement thématique

    Sans `champs`, recherche sur le texte intégral (plus large, moins précis).

    ### 2.3 Cartographie des 8 outils JUDILIBRE

    | Outil | Usage | Paramètres clés |
    |---|---|---|
    | **`judilibre_rechercher`** | Recherche plein texte dans les décisions. **Point d'entrée principal.** | `query`, `operateur` (or/and/exact), `juridiction`, `chambre`, `solution`, `publication`, `champs`, `tri` (scorepub/score/date), `date_debut`, `date_fin` |
    | **`judilibre_decision`** | Texte intégral + toutes métadonnées d'une décision par ID | `id`, `query` (pour surlignage) |
    | **`judilibre_scan`** | Export paginé par curseur `search_after`. Pour grands volumes. | `search_after` (ID de la dernière décision du lot précédent) |
    | **`judilibre_export`** | Export par numéro de lot (`lot`). Jusqu'à 1 000 décisions/lot. | `lot` (commence à 0), `taille_lot` |
    | **`judilibre_taxonomie`** | Valeurs valides pour tous les filtres | `id` (type/jurisdiction/chamber/formation/publication/theme/solution/field/location/filetype) |
    | **`judilibre_stats`** | Statistiques et répartitions | `juridiction`, `agregations` (year,chamber,solution,theme…) |
    | **`judilibre_historique`** | Opérations create/update/delete depuis une date | `date` (ISO-8601), `from_id` (pagination) |
    | **`judilibre_healthcheck`** | Disponibilité de l'API JUDILIBRE | — |

