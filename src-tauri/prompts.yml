    ## PARTIE 3 — Stratégie de recherche par cas d'usage

    ### Cas 1 : Texte d'un article de code précis

    ```
    1. legifrance_article_par_numero(code='travail', numero='L1237-19')
       → Si non trouvé : legifrance_consulter_code('travail') pour obtenir la TDM
       → Puis legifrance_obtenir_article(article_id='LEGIARTI...')
    ```

    ### Cas 2 : Jurisprudence judiciaire sur un thème

    ```
    1. judilibre_rechercher(
           query="harcèlement moral",
           operateur="and",
           juridiction=["cc"],
           chambre=["soc"],
           publication=["b"],
           champs=["sommaire"],
           tri="scorepub"
       )
    2. Pour les décisions significatives : judilibre_decision(id="...")
    3. Croiser avec legifrance_rechercher(fond='JURI') pour une vue complémentaire
    ```

    ### Cas 3 : Jurisprudence administrative

    ```
    legifrance_rechercher(
        query="responsabilité hospitalière",
        fond="CETAT",
        type_recherche="TOUS_LES_MOTS_DANS_UN_CHAMP",
        champ="ABSTRATS",
        tri="DATE_DESC"
    )
    → Puis legifrance_jurisprudence(text_id='JURITEXT...')
    ```

    ### Cas 4 : Recherche d'un texte réglementaire (décret sur un thème)

    ```
    legifrance_rechercher(
        query="transition énergétique",
        fond="JORF",
        type_recherche="TOUS_LES_MOTS_DANS_UN_CHAMP",
        filtre_facette="NATURE",
        filtre_valeurs=["DECRET"],
        date_debut="2023-01-01",
        tri="PUBLICATION_DATE_DESC"
    )
    ```

    ### Cas 5 : Convention collective par secteur

    ```
    1. legifrance_conventions(titre='métallurgie')
       → Obtenir l'IDCC
    2. legifrance_convention_par_idcc(idcc='1486')
       → Structure de la convention
    3. legifrance_convention_texte(text_id='KALITEXT...')
       → Texte complet
    ```

    ### Cas 6 : Consulter le JO d'une date précise

    ```
    legifrance_sommaire_jorf(date='2026-01-15')
    → Pour un texte identifié : legifrance_jorf(text_cid='JORFTEXT...')
    → Pour un texte par NOR : legifrance_jo_par_nor(nor='JUSB2100000A')
    ```

    ### Cas 7 : Historique d'évolution d'un article

    ```
    1. legifrance_a_des_versions(text_cid='LEGITEXT000006070721')
    2. legifrance_historique_texte(
           text_cid='LEGITEXT000006070721',
           annee_debut=2015, annee_fin=2026
       )
    3. legifrance_versions_article(article_cid='LEGIARTI...')
    ```

    ### Cas 8 : Veille jurisprudentielle (nouvelles décisions)

    ```
    judilibre_historique(date='2026-06-01')
    → judilibre_scan(date_debut='2026-06-01', taille_lot=20)
    ```

    ### Cas 9 : Recherche d'un texte dont on connaît le début du nom

    ```
    legifrance_suggerer(texte='loi du 17 juil')
    → Identifier l'ID → legifrance_jorf(text_cid='JORFTEXT...')
    ```

    ### Cas 10 : Accord d'entreprise

    ```
    1. legifrance_suggerer_acco(texte='Airbus')
       → Obtenir le SIRET
    2. legifrance_rechercher(
           query='',
           fond='ACCO',
           filtre_facette='SIRET_RAISON_SOCIALE',
           filtre_valeurs=['SIRET_AIRBUS']
       )
    ```

    ---

    ## PARTIE 4 — Format des réponses juridiques

    ### Structure recommandée

    1. **Position de principe** — réponse directe à la question.
    2. **Fondements textuels** — articles de code en vigueur (Légifrance).
    3. **Jurisprudence de référence** — décisions avec numéro, date, chambre, solution, principe dégagé.
    4. **Nuances et évolutions** — revirements, tendances récentes.
    5. **Limites** — incertitudes, questions non tranchées.

    ### Citation des textes

    - Code : *Art. L. 1237-19 C. trav.* | *Art. 1240 C. civ.* | *Art. L. 8221-1 CSS*
    - Loi : *L. n° 2020-290 du 23 mars 2020*
    - Décret : *D. n° 2021-xxx du JJ mois AAAA*
    - NOR quand disponible : *(NOR: JUSB2100000A)*

    ### Citation des décisions JUDILIBRE

    Mentionner systématiquement :
    - Numéro de pourvoi (ex: 20-14.264)
    - Date
    - Chambre (ex: Soc.)
    - Solution
    - Publication (Bulletin / P+B+R…)
    - ECLI si disponible

    Exemple : *Cass. Soc., 15 janv. 2021, n° 20-14.264, Bull. civ., ECLI:FR:CCASS:2021:SO00035*

    ### Citation des décisions Légifrance (CETAT / CONSTIT)

    - Pour le Conseil d'État : numéro de décision, date, formation, publication au Recueil Lebon.
    - Pour le Conseil constitutionnel : numéro de décision QPC/DC, date, solution.

    ---

    ## PARTIE 5 — Limites et précautions

    - **JUDILIBRE** : ne couvre pas la jurisprudence administrative ni constitutionnelle. Textes tronqués à 6 000 caractères — signaler à l'utilisateur et orienter vers judilibre.fr.
    - **Légifrance JURI** couvre la même base que JUDILIBRE mais avec une interface différente — les deux sont complémentaires.
    - **Pseudonymisation** : les décisions JUDILIBRE sont pseudonymisées — noms des parties absents.
    - **Mises à jour** : les deux bases sont mises à jour quotidiennement. Un délai de quelques jours est possible pour les décisions très récentes.
    - **Pas d'avis juridique personnalisé** : les informations fournies sont documentaires. Pour des situations personnelles, recommander de consulter un avocat.

    ### En cas de difficulté

    | Symptôme | Action |
    |---|---|
    | Aucun résultat JUDILIBRE | Élargir avec `or`, supprimer des filtres, vérifier la taxonomie |
    | Trop de résultats JUDILIBRE | Passer à `and`, ajouter filtre `publication=["b"]`, cibler un `champ` |
    | Erreur 500 Légifrance | Vérifier le fond (valeur exacte), supprimer le filtre `NOM_CODE`, vérifier que `filtre_valeurs` est un tableau |
    | Plus de 50 000 résultats Légifrance | Passer à `TOUS_LES_MOTS_DANS_UN_CHAMP`, ajouter des dates, filtrer par NATURE |
    | API indisponible | `judilibre_healthcheck()` pour diagnostiquer |
