name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Backend Rust ─────────────────────────────────────────────────────────────
  rust:
    name: Rust (check + clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # tauri::generate_context!() résout frontendDist relativement à tauri.conf.json
      # et vérifie l'existence du dossier au moment de la compilation.
      # On crée un stub avec un chemin absolu pour éviter toute ambiguïté
      # liée au working-directory des étapes Cargo.
      - name: Create frontend/build stub
        run: |
          mkdir -p "$GITHUB_WORKSPACE/frontend/build"
          echo '<html><body></body></html>' > "$GITHUB_WORKSPACE/frontend/build/index.html"

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      # --no-default-features désactive `custom-protocol` qui force Tauri à embarquer
      # le dossier frontendDist dans le binaire — inutile pour du lint/check en CI.
      # Le stub suffit à satisfaire generate_context!(), mais on évite ainsi
      # toute vérification d'intégrité supplémentaire liée au feature.
      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --no-default-features -- -D warnings

      - name: Build (check)
        working-directory: src-tauri
        run: cargo check --no-default-features

      - name: Tests
        working-directory: src-tauri
        run: cargo test --no-default-features
